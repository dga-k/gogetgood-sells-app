<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Stock Pro - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .tab-active { border-bottom: 4px solid #4f46e5; color: #4f46e5; }
        input[readonly] { cursor: default; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900">
    <div id="app" class="max-w-6xl mx-auto p-4 md:p-8">
        
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-4xl font-black text-indigo-600 tracking-tight">EVENT STOCK PRO</h1>
                <p class="text-gray-500">ระบบจัดการสต็อกและลิงก์พนักงานอัจฉริยะ</p>
            </div>
            <div class="flex gap-2">
                <button onclick="openModal('event-modal')" class="bg-white border border-gray-200 px-4 py-2 rounded-xl shadow-sm hover:bg-gray-50 font-bold text-sm">+ งานอีเวนต์</button>
                <button onclick="openModal('product-modal')" class="bg-white border border-gray-200 px-4 py-2 rounded-xl shadow-sm hover:bg-gray-50 font-bold text-sm">+ เพิ่มสินค้า</button>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-10">
            <a href="inventory_report.html" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center hover:shadow-md transition-all">
                <span class="text-3xl mb-3">📊</span>
                <span class="font-bold text-slate-700">รายงานสต็อก</span>
            </a>
            <a href="stock_management.html" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center hover:shadow-md transition-all">
                <span class="text-3xl mb-3">📥</span>
                <span class="font-bold text-slate-700">เติมสต็อกเข้าบูธ</span>
            </a>
            <a href="stock_transfer.html" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center hover:shadow-md transition-all">
                <span class="text-3xl mb-3">🔄</span>
                <span class="font-bold text-slate-700">โอนของระหว่างบูธ</span>
            </a>
        </div>
        
        <section class="bg-white p-6 rounded-3xl shadow-xl shadow-indigo-100/50 border border-indigo-50 mb-10">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2 uppercase">เลือกคอนเสิร์ต / อีเวนต์</label>
                    <select id="event-select" class="w-full p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-indigo-900">
                        <option value="">-- กรุณาเลือกรายการอีเวนต์ --</option>
                    </select>
                </div>
                <div class="flex flex-wrap gap-2 justify-end">
                    <button onclick="openModal('booth-modal')" class="bg-indigo-600 text-white px-6 py-4 rounded-2xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-200">
                        + เพิ่มบูท
                    </button>
                    <button onclick="openModal('event-modal')" class="bg-white border border-gray-200 px-6 py-4 rounded-2xl font-bold text-gray-600 hover:bg-gray-50 shadow-sm">
                        ⚙️ ตั้งค่าอีเวนต์
                    </button>
                </div>
            </div>

            <div id="event-info-bar" class="hidden mt-6 pt-6 border-t border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <div class="bg-indigo-50 p-3 rounded-2xl">
                        <span class="text-xs font-bold text-indigo-400 block uppercase">QR PromptPay</span>
                        <span id="display-qr-number" class="text-lg font-black text-indigo-700">-</span>
                    </div>
                    <div id="status-badge" class="px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest">
                        STATUS: UNKNOWN
                    </div>
                </div>
                <div class="flex gap-2">
                    <button id="toggle-status-btn" class="px-6 py-3 rounded-xl font-bold text-white transition-all shadow-md">
                        เปลี่ยนสถานะงาน
                    </button>
                </div>
                <button id="reset-event-btn" class="px-6 py-3 rounded-xl font-bold text-red-600 bg-red-50 hover:bg-red-100 border border-red-200 transition-all shadow-sm ml-2">
                    🗑️ Reset Data
                </button>
            </div>
        </section>

        <div class="flex gap-8 mb-6 border-b border-gray-200 overflow-x-auto">
            <button onclick="switchTab('booths')" id="tab-booths" class="pb-3 font-bold tab-active whitespace-nowrap">🏪 สถานะบูธ & สต็อก</button>
            <button onclick="switchTab('links')" id="tab-links" class="pb-3 font-bold text-gray-400 whitespace-nowrap">🔗 ลิงก์พนักงาน</button>
        </div>

        <div id="content-booths" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="text-gray-400 col-span-full text-center py-20 italic">กรุณาเลือกงานอีเวนต์เพื่อแสดงข้อมูลบูธ</p>
        </div>

        <div id="content-links" class="hidden">
            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
                            <tr>
                                <th class="p-5 font-bold">ชื่อบูธ</th>
                                <th class="p-5 font-bold">URL สำหรับพนักงาน (Staff Page)</th>
                                <th class="p-5 font-bold text-center">คัดลอก</th>
                            </tr>
                        </thead>
                        <tbody id="link-table-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

   <div id="event-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold mb-6">สร้างอีเวนต์ใหม่</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-400">ชื่ออีเวนต์</label>
                    <input type="text" id="new-event-name" placeholder="เช่น Summer Fest 2026" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400">เลขเบอร์ QR Code (สำหรับรับเงิน)</label>
                    <input type="text" id="new-event-qr" value="0636628882" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400">สถานะเริ่มต้น</label>
                    <select id="new-event-status" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="active">เปิดการขาย (Active)</option>
                        <option value="closed">ปิดงาน (Closed)</option>
                    </select>
                </div>
                <div>
                <label class="text-xs font-bold text-gray-400">รูปแบบสต็อก</label>
                <select id="new-event-stock-mode" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="individual">แยกสต็อกรายบูธ (Individual)</option>
                    <option value="shared">ใช้สต็อกคลังกลางร่วมกัน (Shared)</option>
                </select>
            </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="closeModal('event-modal')" class="flex-1 py-4 font-bold text-gray-500">ยกเลิก</button>
                <button id="save-event-btn" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold">บันทึก</button>
            </div>
        </div>
    </div>

    <div id="product-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold mb-6">เพิ่มสินค้าเข้าระบบ</h2>
            <div class="space-y-4">
                <input type="text" id="new-product-name" placeholder="ชื่อสินค้า" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="number" id="new-product-price" placeholder="ราคา (บาท)" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="number" id="new-product-pack" placeholder="จำนวนสินค้าต่อแพ็ค (Default: 1)" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="closeModal('product-modal')" class="flex-1 py-4 font-bold text-gray-500">ยกเลิก</button>
                <button id="save-product-btn" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold">บันทึก</button>
            </div>
        </div>
    </div>

    <div id="booth-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold mb-6">เพิ่มบูทใหม่</h2>
            <input type="text" id="new-booth-name" placeholder="ชื่อบูท เช่น 'A1 - เครื่องดื่ม'" class="w-full p-4 bg-gray-100 rounded-2xl mb-6 outline-none focus:ring-2 focus:ring-indigo-500 font-medium">
            <div class="flex gap-3">
                <button onclick="closeModal('booth-modal')" class="flex-1 py-4 font-bold text-gray-500">ยกเลิก</button>
                <button id="save-booth-btn" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold">บันทึก</button>
            </div>
        </div>
    </div>

    <div id="stock-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold mb-2">📦 เติมสต็อกสินค้า</h2>
            <p id="target-booth-name" class="text-indigo-600 font-bold mb-6 italic"></p>
            <div class="space-y-4">
                <label class="text-xs font-bold text-gray-400">เลือกสินค้า</label>
                <select id="stock-product-select" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500"></select>
                <label class="text-xs font-bold text-gray-400">จำนวนที่เติม (ชิ้น)</label>
                <input type="number" id="stock-qty" value="0" min="0" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="closeModal('stock-modal')" class="flex-1 py-4 font-bold text-gray-500">ยกเลิก</button>
                <button id="confirm-stock-btn" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold">ยืนยันเติมของ</button>
            </div>
        </div>
    </div>

    <script>
        const store = { currentEventId: null, currentBoothId: null, allProducts: [] };
        // URL หน้าขาย (Sell Page) จะใช้ Path เดียวกับหน้าหลัก
        const STAFF_PAGE_URL = window.location.origin + "/sell.html";

        // UI Controls
        window.openModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        function switchTab(tab) {
            document.getElementById('content-booths').classList.toggle('hidden', tab !== 'booths');
            document.getElementById('content-links').classList.toggle('hidden', tab !== 'links');
            document.getElementById('tab-booths').className = tab === 'booths' ? 'pb-3 font-bold tab-active' : 'pb-3 font-bold text-gray-400';
            document.getElementById('tab-links').className = tab === 'links' ? 'pb-3 font-bold tab-active' : 'pb-3 font-bold text-gray-400';
        }

        // Data Management
        async function init() {
            if (typeof _supabase === 'undefined') return alert('Error: config.js not loaded!');
            await loadEvents();
            await loadAllProducts();
        }

        async function loadEvents() {
            const { data } = await _supabase.from('events').select('*');
            if (data) {
                document.getElementById('event-select').innerHTML = '<option value="">-- กรุณาเลือกรายการอีเวนต์ --</option>' + 
                    data.map(ev => {
                        // ใส่ Badge สีตามสถานะ
                        const statusIcon = ev.status === 'active' ? '🟢' : '🔴';
                        return `<option value="${ev.id}">${statusIcon} ${ev.event_name} (${ev.status})</option>`;
                    }).join('');
            }
        }

        async function loadAllProducts() {
            const { data } = await _supabase.from('products').select('*').order('name');
            store.allProducts = data || [];
            document.getElementById('stock-product-select').innerHTML = 
                store.allProducts.map(p => `<option value="${p.id}">${p.name} (฿${p.price})</option>`).join('');
        }

        async function loadBooths(eventId) {
            const { data: booths } = await _supabase.from('booths').select('*').eq('event_id', eventId).order('booth_name');
            renderBoothCards(booths, eventId);
            renderLinkTable(booths, eventId);
        }

        async function renderBoothCards(booths, eventId) {
            const container = document.getElementById('content-booths');
            if (!booths || booths.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center py-20 text-gray-400">ยังไม่มีบูทในงานนี้</p>';
                return;
            }

            container.innerHTML = '<p class="col-span-full text-center py-10 animate-pulse text-indigo-500">กำลังโหลดสต็อกบูธ...</p>';
            
            let html = '';
            for (const booth of booths) {
                const { data: stock } = await _supabase.from('booth_inventory')
                    .select('stock_qty, products(name)')
                    .eq('booth_id', booth.id);

                const stockHtml = stock?.map(s => `
                    <div class="flex justify-between items-center py-2 border-b border-gray-50 last:border-0">
                        <span class="text-sm text-gray-600">${s.products.name}</span>
                        <span class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-xs font-bold">${s.stock_qty}</span>
                    </div>
                `).join('') || '<p class="text-xs text-gray-300 italic py-2">ไม่มีสินค้า</p>';

                html += `
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 hover:shadow-xl transition-all duration-300">
                        <h3 class="text-xl font-black text-gray-800 mb-4">${booth.booth_name}</h3>
                        <div class="bg-gray-50 rounded-2xl p-4 mb-4 space-y-1">${stockHtml}</div>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="openStockModal('${booth.id}', '${booth.booth_name}')" class="bg-green-50 text-green-700 py-3 rounded-xl text-xs font-bold border border-green-200 hover:bg-green-100 transition-colors">เติมสต็อก</button>
                            <a href="sell.html?id=${booth.id}&event_id=${eventId}" class="bg-indigo-600 text-white py-3 rounded-xl text-xs font-bold hover:bg-indigo-700 shadow-md text-center flex items-center justify-center">🛒 หน้าขาย</a>
                        </div>
                    </div>`;
            }
            container.innerHTML = html;
        }

        function renderLinkTable(booths, eventId) {
            const tbody = document.getElementById('link-table-body');
            if (!booths || booths.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-gray-400 italic">ไม่มีข้อมูลบูธ</td></tr>';
                return;
            }

            tbody.innerHTML = booths.map(b => {
                const url = `${STAFF_PAGE_URL}?id=${b.id}&event_id=${eventId}`;
                return `
                <tr class="hover:bg-indigo-50/30 transition-colors border-b border-gray-50">
                    <td class="p-5 font-bold text-gray-800">${b.booth_name}</td>
                    <td class="p-5">
                        <input type="text" value="${url}" id="link-${b.id}" readonly class="w-full bg-gray-100 p-3 rounded-xl text-[10px] md:text-xs text-gray-500 border-none outline-none">
                    </td>
                    <td class="p-5 text-center">
                        <button onclick="copyLink('${b.id}')" class="bg-indigo-600 text-white px-5 py-2 rounded-xl text-xs font-bold hover:bg-indigo-700 shadow-sm whitespace-nowrap">คัดลอกลิงก์</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function copyLink(id) {
            const input = document.getElementById('link-' + id);
            input.select();
            input.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(input.value);
            
            // Visual feedback
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '✅ สำเร็จ!';
            btn.classList.replace('bg-indigo-600', 'bg-green-600');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.replace('bg-green-600', 'bg-indigo-600');
            }, 2000);
        }
        // เพิ่มตัวแปรเก็บข้อมูล Event ปัจจุบัน
        let currentEventData = null;

        // แก้ไขฟังก์ชันโหลดอีเวนต์ เพื่อให้ดึงข้อมูล QR และ Status มาด้วย
        async function loadEvents() {
            const { data } = await _supabase.from('events').select('*');
            if (data) {
                document.getElementById('event-select').innerHTML = '<option value="">-- กรุณาเลือกรายการอีเวนต์ --</option>' + 
                    data.map(ev => {
                        const dot = ev.status === 'active' ? '🟢' : '🔴';
                        return `<option value="${ev.id}">${dot} ${ev.event_name}</option>`;
                    }).join('');
            }
        }

        // ฟังก์ชันอัปเดตสถานะงาน (Toggle Active/Closed)
        async function toggleEventStatus() {
            if (!currentEventData) return;
            
            const newStatus = currentEventData.status === 'active' ? 'closed' : 'active';
            const confirmMsg = newStatus === 'closed' 
                ? "ต้องการ 'ปิดการขาย' ทั้งอีเวนต์ใช่ไหม? (พนักงานจะกดขายไม่ได้)" 
                : "ต้องการ 'เปิดการขาย' ใช่ไหม?";
                
            if (!confirm(confirmMsg)) return;

            const { error } = await _supabase
                .from('events')
                .update({ status: newStatus })
                .eq('id', currentEventData.id);

            if (!error) {
                alert('อัปเดตสถานะเรียบร้อย!');
                // รีโหลดข้อมูลงานใหม่
                const { data } = await _supabase.from('events').select('*').eq('id', currentEventData.id).single();
                updateEventUI(data);
                loadEvents(); // อัปเดต Dropdown ด้วย
            }
        }

        // ฟังก์ชันอัปเดต UI เมื่อเลือกงาน
        function updateEventUI(event) {
            currentEventData = event;
            const infoBar = document.getElementById('event-info-bar');
            const qrDisplay = document.getElementById('display-qr-number');
            const statusBadge = document.getElementById('status-badge');
            const toggleBtn = document.getElementById('toggle-status-btn');

            infoBar.classList.remove('hidden');
            qrDisplay.innerText = event.qr_code_number || 'ยังไม่ได้ระบุ';
            
            if (event.status === 'active') {
                statusBadge.innerText = '● กำลังเปิดการขาย';
                statusBadge.className = 'px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest bg-green-100 text-green-700';
                toggleBtn.innerText = '🔴 ปิดงาน (Stop Sales)';
                toggleBtn.className = 'px-6 py-3 rounded-xl font-bold text-white bg-red-500 hover:bg-red-600 shadow-md transition-all';
            } else {
                statusBadge.innerText = '● ปิดการขายแล้ว';
                statusBadge.className = 'px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest bg-gray-100 text-gray-500';
                toggleBtn.innerText = '🟢 เปิดงาน (Start Sales)';
                toggleBtn.className = 'px-6 py-3 rounded-xl font-bold text-white bg-green-600 hover:bg-green-700 shadow-md transition-all';
            }
        }
        document.getElementById('reset-event-btn').onclick = async function() {
            if (!currentEventData) return alert('กรุณาเลือกอีเวนต์ก่อน');

            // ขั้นตอนการยืนยัน (ป้องกันการกดพลาด)
            const confirm1 = confirm(`⚠️ คำเตือน: คุณกำลังจะลบข้อมูล "ยอดขาย" และ "ประวัติการเติมสต็อก" ทั้งหมดของงาน [${currentEventData.event_name}] ใช่หรือไม่?`);
            if (!confirm1) return;

            const confirm2 = prompt(`กรุณาพิมพ์คำว่า "RESET" เพื่อยืนยันการลบข้อมูลทั้งหมด:`);
            if (confirm2 !== "RESET") return alert('ยกเลิกการ Reset: คำยืนยันไม่ถูกต้อง');

            try {
                const eventId = currentEventData.id;

                // 1. ลบข้อมูลการขาย (Sales Transactions)
                const { error: err1 } = await _supabase
                    .from('sales_transactions')
                    .delete()
                    .eq('event_id', eventId);

                // 2. ลบประวัติการโอนสต็อก (Transfers)
                const { error: err2 } = await _supabase
                    .from('stock_transfers')
                    .delete()
                    .eq('event_id', eventId); // *หมายเหตุ: ตารางนี้ควรมีคอลัมน์ event_id

                // 3. ลบประวัติการเติมสต็อก (Stock Logs)
                const { error: err3 } = await _supabase
                    .from('stock_logs')
                    .delete()
                    .eq('event_id', eventId); // *หมายเหตุ: ตารางนี้ควรมีคอลัมน์ event_id

                // 4. รีเซ็ตยอดสต็อกในบูธให้เป็น 0 (Booth Inventory)
                // ดึงรายชื่อบูธในงานนี้มาก่อน
                const { data: boothIds } = await _supabase.from('booths').select('id').eq('event_id', eventId);
                const ids = boothIds.map(b => b.id);
                
                const { error: err4 } = await _supabase
                    .from('booth_inventory')
                    .update({ stock_qty: 0 })
                    .in('booth_id', ids);

                if (err1 || err2 || err4) throw new Error('เกิดข้อผิดพลาดในการลบข้อมูลบางส่วน');

                alert('✅ รีเซ็ตข้อมูลเรียบร้อยแล้ว! ข้อมูลการขายและสต็อกเป็นศูนย์');
                location.reload(); // รีโหลดหน้าจอเพื่ออัปเดตตัวเลข

            } catch (error) {
                console.error(error);
                alert('เกิดข้อผิดพลาด: ' + error.message);
            }
        };
        // เพิ่ม Listener ให้ Dropdown
        document.getElementById('event-select').addEventListener('change', async (e) => {
            const eventId = e.target.value;
            if (eventId) {
                store.currentEventId = eventId;
                const { data } = await _supabase.from('events').select('*').eq('id', eventId).single();
                updateEventUI(data);
                loadBooths(eventId); // ฟังก์ชันเดิมของคุณที่ใช้โหลด Card บูธ
            } else {
                document.getElementById('event-info-bar').classList.add('hidden');
            }
        });

        // ผูกปุ่ม Toggle
        document.getElementById('toggle-status-btn').onclick = toggleEventStatus;
        // Action Handlers
        document.getElementById('event-select').addEventListener('change', (e) => {
            if (e.target.value) {
                store.currentEventId = e.target.value;
                loadBooths(e.target.value);
            }
        });

        document.getElementById('save-event-btn').addEventListener('click', async () => {
            const name = document.getElementById('new-event-name').value;
            const qr = document.getElementById('new-event-qr').value;
            const status = document.getElementById('new-event-status').value;
            const mode = document.getElementById('new-event-stock-mode').value;
            
            if (!name) return alert('กรุณาระบุชื่ออีเวนต์');

            const { error } = await _supabase.from('events').insert([
                { 
                    event_name: name, 
                    qr_code_number: qr, 
                    status: status,
                    stock_mode:mode 
                }
            ]);

            if (!error) {
                alert('สร้างอีเวนต์เรียบร้อย!');
                location.reload();
            } else {
                alert('Error: ' + error.message);
            }
        });

        document.getElementById('save-product-btn').addEventListener('click', async () => {
            const name = document.getElementById('new-product-name').value;
            const price = parseFloat(document.getElementById('new-product-price').value);
            const pack = parseInt(document.getElementById('new-product-pack').value) || 1;
            if (!name || isNaN(price)) return alert('ข้อมูลไม่ครบ');
            const { error } = await _supabase.from('products').insert([{ name, price, items_per_pack: pack }]);
            if (!error) { closeModal('product-modal'); loadAllProducts(); }
        });

        document.getElementById('save-booth-btn').addEventListener('click', async () => {
            if (!store.currentEventId) return alert('กรุณาเลือกอีเวนต์ก่อน');
            const name = document.getElementById('new-booth-name').value;
            if (!name) return alert('ระบุชื่อบูธ');
            const { error } = await _supabase.from('booths').insert([{ event_id: store.currentEventId, booth_name: name }]);
            if (!error) { closeModal('booth-modal'); loadBooths(store.currentEventId); }
        });

        window.openStockModal = (id, name) => {
            store.currentBoothId = id;
            document.getElementById('target-booth-name').innerText = `บูท: ${name}`;
            openModal('stock-modal');
        }

        document.getElementById('confirm-stock-btn').addEventListener('click', async () => {
            const productId = document.getElementById('stock-product-select').value;
            const qty = parseInt(document.getElementById('stock-qty').value);
            
            const { data: current } = await _supabase.from('booth_inventory')
                .select('stock_qty').eq('booth_id', store.currentBoothId).eq('product_id', productId).maybeSingle();
            
            const newQty = (current?.stock_qty || 0) + qty;
            const { error } = await _supabase.from('booth_inventory').upsert({
                booth_id: store.currentBoothId, product_id: productId, stock_qty: newQty
            }, { onConflict: 'booth_id, product_id' });

            if (!error) { 
                closeModal('stock-modal'); 
                loadBooths(store.currentEventId);
                alert('เติมสต็อกเรียบร้อย!');
            }
        });

        init();
    </script>
</body>
</html>
