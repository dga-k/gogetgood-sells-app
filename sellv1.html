<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบขายสินค้าหน้าบูธ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; height: 100vh; overflow: hidden; }
        .product-card:active { transform: scale(0.96); transition: 0.1s; }
        
        /* แก้ไข 1: ทำให้ Product Grid เลื่อนได้คงที่ */
        .product-grid-container {
            height: calc(100vh - 450px); /* ลบพื้นที่ Header และ Footer ตะกร้า */
            overflow-y: auto;
            padding-bottom: 20px;
            -webkit-overflow-scrolling: touch;
        }

        /* แก้ไข 2: จัดการชื่อสินค้ายาว */
        .truncate-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }

        /* เอฟเฟกต์สำหรับสินค้าหมด */
        .out-of-stock {
            opacity: 0.5;
            filter: grayscale(0.8);
            pointer-events: none; /* กดไม่ได้ */
        }

        #cart-items-list::-webkit-scrollbar { display: none; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slideUp { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="antialiased">

    <header class="bg-indigo-700 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="showHistory()" class="bg-white/20 p-2 rounded-xl border border-white/30 active:scale-90 transition-all">
                    📜 <span class="text-[10px] font-bold block">ประวัติ</span>
                </button>
                <div>
                    <h1 id="display-booth-name" class="text-sm font-bold leading-none">🏪 กำลังโหลด...</h1>
                    <p id="display-event-name" class="text-[9px] opacity-75 uppercase">รอสักครู่...</p>
                </div>
            </div>
            <div class="bg-white/20 backdrop-blur-md px-3 py-1 rounded-xl text-center border border-white/30">
                <span id="cart-count" class="block text-xl font-black">0</span>
                <span class="text-[9px] font-bold uppercase">ชิ้น</span>
            </div>
        </div>
    </header>

    <main class="p-5">
        <div class="flex justify-between items-center mb-3">
            <h2 class="text-slate-500 text-xs font-black uppercase tracking-widest">เลือกรายการสินค้า</h2>
            <span id="stock-status" class="text-[10px] text-slate-400">เลื่อนดูสินค้าได้ ↓</span>
        </div>
        
        <div class="product-grid-container">
            <div id="product-grid" class="grid grid-cols-2 gap-3">
                </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] px-4 pt-3 safe-area-bottom z-50 rounded-t-[2.5rem]">
        <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-3"></div>

        <div id="cart-items-list" class="max-h-32 overflow-y-auto mb-4 space-y-2">
            <p class="text-center text-slate-300 text-sm py-4 italic">ยังไม่มีสินค้าในตะกร้า</p>
        </div>

        <div class="flex justify-between items-end mb-4 border-t border-slate-100 pt-3">
            <div>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-tight">ยอดรวมสุทธิ</p>
                <p id="total-price" class="text-3xl font-black text-indigo-700">0.-</p>
            </div>
            <button onclick="confirmClearCart()" class="text-red-400 text-xs font-bold bg-red-50 px-4 py-2 rounded-xl hover:bg-red-100 transition-colors">
                ล้างทั้งหมด
            </button>
        </div>
        
        <div class="grid grid-cols-2 gap-3 mb-2">
            <button id="btn-cash" onclick="openChangeModal()" class="bg-emerald-500 text-white py-4 rounded-2xl font-black shadow-lg shadow-emerald-200 active:scale-95 transition-all">💵 เงินสด</button>
            <button id="btn-qr" onclick="openQRModal()" class="bg-sky-500 text-white py-4 rounded-2xl font-black shadow-lg shadow-sky-200 active:scale-95 transition-all">📱 โอน/QR</button>
        </div>
    </div>

    <div id="history-modal" class="fixed inset-0 bg-black/50 z-[60] hidden flex items-end">
        <div class="bg-white w-full rounded-t-[2.5rem] p-6 animate-slideUp max-h-[80vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-black text-slate-800">📜 10 รายการล่าสุด</h2>
                <button onclick="closeHistory()" class="text-slate-400 p-2 text-2xl">&times;</button>
            </div>
            <div id="history-list" class="space-y-3 overflow-y-auto">
                </div>
            <button onclick="closeHistory()" class="w-full mt-6 bg-slate-100 py-3 rounded-2xl font-bold text-slate-500">ปิดหน้าต่าง</button>
        </div>
    </div>
    <div id="qr-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
        <div class="bg-white rounded-3xl p-6 w-full max-w-xs shadow-2xl text-center">
            <h2 class="text-xl font-black mb-1">สแกนเพื่อชำระเงิน</h2>
            <p id="qr-total-text" class="text-indigo-600 font-black text-2xl mb-4">0.-</p>
            
            <div class="bg-gray-50 p-4 rounded-2xl mb-4 flex justify-center border-2 border-dashed border-gray-200">
                <img id="qr-img" src="" alt="PromptPay QR" class="w-48 h-48">
            </div>

            <p class="text-xs text-gray-400 mb-6 italic">* กรุณาตรวจสอบยอดเงินและชื่อบัญชีให้ถูกต้อง</p>
            
            <div class="flex gap-2">
                <button onclick="closeModal('qr-modal')" class="flex-1 py-3 font-bold text-gray-500 bg-gray-100 rounded-xl">ปิด</button>
                <button onclick="confirmPayment('transfer')" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-lg">ยืนยันรับเงินแล้ว</button>
            </div>
        </div>
    </div>
    <div id="change-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[70] p-4">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl animate-slideUp">
            <div class="text-center mb-6">
                <p class="text-slate-400 text-xs font-black uppercase tracking-widest mb-1">ยอดรวมที่ต้องชำระ</p>
                <h2 id="summary-total" class="text-5xl font-black text-indigo-700">0.-</h2>
            </div>

            <div class="space-y-3 mb-8">
                <p class="text-[10px] font-bold text-slate-400 uppercase ml-2">เลือกเงินที่รับมา (คำนวณทอนให้แล้ว)</p>
                <div id="quick-change-options" class="grid grid-cols-1 gap-3">
                    </div>
            </div>

            <div class="flex flex-col gap-3 border-t border-slate-100 pt-6">
                <input type="number" id="manual-cash" placeholder="ระบุยอดเงินอื่นๆ..." 
                    class="w-full p-4 bg-slate-50 rounded-2xl text-center font-bold text-slate-600 outline-none border border-slate-100 focus:border-indigo-300">
                
                <div class="flex gap-2">
                    <button onclick="closeModal('change-modal')" class="flex-1 py-4 font-bold text-slate-400 bg-slate-100 rounded-2xl">ยกเลิก</button>
                    <button onclick="confirmManualCash()" class="flex-[1.5] bg-slate-800 text-white py-4 rounded-2xl font-black shadow-lg">ยืนยัน (เงินสด)</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const bId = params.get('id');
        const evId = params.get('event_id');
        let cart = [];
        let masterStock = []; // เก็บสต็อกล่าสุดไว้เทียบ
        let currentStockBoothId = null;
        async function init() {
            try {

                checkEventStatus();
                getBoothDetail();
        

                // ค. ตัดสินใจว่าจะดึงสต็อกที่บูธไหน (สำคัญมาก!)
                // ต้องเอาผลลัพธ์มาเก็บไว้ที่ currentStockBoothId ก่อนเรียก loadProducts
                currentStockBoothId = await determineStockBooth(); 

                // ง. เรียกโหลดสินค้าขึ้นหน้าจอ
                // ตอนนี้ loadProducts จะรู้แล้วว่าต้องไปดึงที่ ID ไหน
                await loadProducts();

            } catch (error) {
                console.error("Initialization failed:", error);
            }
        }
        async function getBoothDetail() {
            const { data } = await _supabase.from('booths').select('booth_name, events(event_name)').eq('id', bId).single();
            if (data) {
                document.getElementById('display-booth-name').innerText = `🏪 ${data.booth_name}`;
                document.getElementById('display-event-name').innerText = data.events.event_name;
            }
        }
        // เพิ่มฟังก์ชันควบคุม Modal (วางไว้ใน <script> ส่วนบนสุด)
        window.openModal = function(id) {
            const modal = document.getElementById(id);
            if (modal) {
                modal.classList.remove('hidden');
                modal.style.display = 'flex'; // บังคับแสดงผล
            } else {
                console.error("หา Modal ID: " + id + " ไม่เจอ");
            }
        };

        window.closeModal = function(id) {
            const modal = document.getElementById(id);
            if (modal) {
                modal.classList.add('hidden');
                modal.style.display = 'none';
            }
        };
        // ตัวอย่างโค้ดในหน้า sell.html
        async function checkEventStatus() {
            const { data: event } = await _supabase
                .from('events')
                .select('status')
                .eq('id', evId)
                .single();

            if (event.status === 'closed') {
                alert('❌ ขณะนี้ระบบปิดการขายชั่วคราว ไม่สามารถทำรายการได้');
                document.getElementById('btn-cash').disabled = true;
                document.getElementById('btn-cash').innerText = 'ปิดการขาย';
                document.getElementById('btn-qr').disabled = true;
                document.getElementById('btn-qr').innerText = 'ปิดการขาย';
            }
        }
        async function loadProducts() {
            if (!currentStockBoothId) return;
            // 1. ดึงข้อมูลเพิ่ม และกรองเฉพาะที่เปิดใช้งาน (is_enabled)
           
            const { data } = await _supabase.from('booth_inventory')
                .select(`
                    stock_qty, 
                    products(id, name, price, image_url, color_code, sort_order, is_enabled)
                `)
                .eq('booth_id', currentStockBoothId)
                .eq('products.is_enabled', true) // แสดงเฉพาะที่เปิดใช้งาน
                .order('products(sort_order)', { ascending: true }); // เรียงตามลำดับที่เราตั้งไว้
            
            masterStock = data;
            console.log(masterStock)
            const grid = document.getElementById('product-grid');
            
            grid.innerHTML = data.map(item => {
            // 1. ตรวจสอบก่อนว่ามีข้อมูลสินค้าหรือไม่
            if (!item.products) return ''; 

            const p = item.products;
            const isOut = item.stock_qty <= 0;
            
            // 2. ใช้สีประจำสินค้า (ถ้าไม่มีใช้สี Indigo)
            const color = p.color_code || '#F5F5F5';
            const bgColor = color + '80'; // ความโปร่งใส 15%

            return `
            <button onclick="addToCart('${p.id}', '${p.name}', ${p.price})" 
                    ${isOut ? 'disabled' : ''}
                    class="product-card bg-white rounded-2xl border border-slate-100 shadow-sm text-left relative overflow-hidden flex flex-col h-20 transition-all active:scale-95 ${isOut ? 'opacity-60 grayscale' : ''}"
                    style="border-left: 6px solid ${color}">
                
                <div class="p-3 flex flex-col justify-between h-full w-full" style="background-color: ${bgColor}">
                    <div>
                        <p class="font-bold text-slate-800 text-xs leading-tight mb-0.5 line-clamp-2">${p.name || 'ไม่มีชื่อสินค้า'}</p>
                        <p class="text-indigo-600 font-black text-base">${p.price || 0}.-</p>
                    </div>
                </div>

                ${isOut ? `
                <div class="absolute inset-0 bg-white/40 flex items-center justify-center">
                    <span class="bg-red-500 text-white text-[9px] px-2 py-1 rounded-lg font-bold rotate-12 shadow-lg uppercase">Out of Stock</span>
                </div>
                ` : ''}
            </button>
            `;
        }).join('');
        }

        function addToCart(id, name, price) {
            const productStock = masterStock.find(s => s.products.id === id);
            const existing = cart.find(item => item.id === id);
            const currentQty = existing ? existing.qty : 0;

            // แก้ไข: เช็คสต็อกก่อนเพิ่ม
            if (currentQty + 1 > productStock.stock_qty) {
                alert(`❌ สินค้า "${name}" ไม่พอขาย (คงเหลือ ${productStock.stock_qty})`);
                if (window.navigator.vibrate) window.navigator.vibrate([50, 50, 50]);
                return;
            }

            if (existing) {
                existing.qty++;
            } else {
                cart.push({ id, name, price, qty: 1 });
            }
            if (window.navigator.vibrate) window.navigator.vibrate(15);
            updateUI();
        }

        function removeFromCart(id) {
            const index = cart.findIndex(item => item.id === id);
            if (index > -1) {
                cart[index].qty--;
                if (cart[index].qty <= 0) cart.splice(index, 1);
            }
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('cart-items-list');
            if (cart.length === 0) {
                list.innerHTML = '<p class="text-center text-slate-300 text-sm py-4 italic">ยังไม่มีสินค้าในตะกร้า</p>';
            } else {
                list.innerHTML = cart.map(item => `
                    <div class="flex justify-between items-center bg-slate-50 p-3 rounded-2xl border border-slate-100">
                        <div class="flex-1 min-w-0 pr-2">
                            <p class="text-xs font-black text-slate-700 truncate-text">${item.name}</p>
                            <p class="text-[10px] font-bold text-indigo-500">${item.price}.- / ชิ้น</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <button onclick="removeFromCart('${item.id}')" class="w-8 h-8 rounded-full bg-white shadow-sm border border-slate-200 text-red-500 flex items-center justify-center font-black">-</button>
                            <span class="font-black text-slate-800 text-sm w-4 text-center">${item.qty}</span>
                            <button onclick="addToCart('${item.id}', '${item.name}', ${item.price})" class="w-8 h-8 rounded-full bg-white shadow-sm border border-slate-200 text-emerald-500 flex items-center justify-center font-black">+</button>
                        </div>
                    </div>
                `).join('');
            }

            const count = cart.reduce((sum, item) => sum + item.qty, 0);
            const total = cart.reduce((sum, item) => sum + (item.qty * item.price), 0);
            document.getElementById('cart-count').innerText = count;
            document.getElementById('total-price').innerText = total.toLocaleString() + '.-';
            list.scrollTop = list.scrollHeight;
        }
       // ฟังก์ชันตัดสินใจว่าจะใช้สต็อกที่บูธไหน
        async function determineStockBooth() {
            try {
               

                // 1. ดึงการตั้งค่า mode ของอีเวนต์นี้
                const { data: event, error: evError } = await _supabase
                    .from('events')
                    .select('stock_mode')
                    .eq('id', evId)
                    .single();

                if (evError || !event) return bId; // กันเหนียว: ถ้าผิดพลาด ให้ใช้บูธตัวเอง

                // 2. ถ้าเป็นโหมดแยก (individual) ให้คืนค่า ID บูธตัวเอง
                if (event.stock_mode === 'individual') {
                    return bId;
                }

                // 3. ถ้าเป็นโหมดรวม (shared) ให้ค้นหา ID บูธที่ชื่อ "คลังกลาง"
                const { data: centralBooth, error: boothError } = await _supabase
                    .from('booths')
                    .select('id')
                    .eq('event_id', evId)
                    .eq('booth_name', 'คลังกลาง')
                    .single();

                if (boothError || !centralBooth) {
                    console.warn("ไม่พบชื่อบูธ 'คลังกลาง' ในโหมด shared สต็อกอาจจะไม่แสดง");
                    return bId;
                }

                return centralBooth.id;

            } catch (e) {
                console.error("Error determining stock booth:", e);
                return bId;
            }
        }
        window.openQRModal = async function() {
            // 1. คำนวณยอดรวมจากตะกร้าสินค้า
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            
            if (total <= 0) return alert('กรุณาเลือกสินค้าก่อนครับ');

            try {
                // 2. ดึงข้อมูล Event เพื่อเอาเลข qr_code_number
                // หมายเหตุ: currentEventId ต้องได้มาจาก URL Params หรือ store ที่คุณเก็บไว้
                const { data: event, error } = await _supabase
                    .from('events')
                    .select('qr_code_number, status')
                    .eq('id', evId) // หรือใช้ตัวแปรที่เก็บ ID งานปัจจุบันไว้
                    .single();

                if (error || !event) {
                    console.error('Fetch Event Error:', error);
                    return alert('ไม่สามารถดึงข้อมูลอีเวนต์ได้');
                }

                // 3. ตรวจสอบสถานะ (ถ้า Admin ปิดงาน ไม่ให้สร้าง QR)
                if (event.status === 'closed') {
                    return alert('❌ อีเวนต์นี้ปิดการขายแล้ว ไม่สามารถรับชำระเงินได้');
                }

                if (!event.qr_code_number) {
                    return alert('⚠️ อีเวนต์นี้ยังไม่ได้ระบุเลขเบอร์ QR สำหรับรับเงิน');
                }

                // 4. แสดงยอดเงินใน Modal
                document.getElementById('qr-total-text').innerText = total.toLocaleString() + '.-';

                // 5. สร้าง URL สำหรับ PromptPay QR Code (ใช้เลขที่ดึงมาจาก DB)
                const cleanQRNumber = event.qr_code_number.replace(/-/g, ""); // ตัดเครื่องหมายขีดออกถ้ามี
                const qrUrl = `https://promptpay.io/${cleanQRNumber}/${total}.png`;
                
                document.getElementById('qr-img').src = qrUrl;

                // 6. เปิด Modal
                openModal('qr-modal');

            } catch (err) {
                console.error('System Error:', err);
                alert('เกิดข้อผิดพลาดในการสร้าง QR Code');
                openModal('qr-modal');
            }
        };
                // ฟังก์ชันยืนยันการจ่ายเงิน (ปรับใช้ตาม logic เดิมของคุณ)
        window.confirmPayment = async function(method) {
            // ใส่ Logic การตัดสต็อกและบันทึกข้อมูลลง Database ตรงนี้
            // เมื่อสำเร็จให้ปิด Modal และเคลียร์ตะกร้า
            checkout('qr')
            
            closeModal('qr-modal');
            // cart = []; renderCart(); ...
        };
        async function getEventQRData(eventId) {
            const { data, error } = await _supabase
                .from('events')
                .select('qr_code_number, status') // ดึงทั้งเลข QR และสถานะมาเช็คพร้อมกัน
                .eq('id', eventId)
                .single(); // ใช้ .single() เพราะเราต้องการข้อมูลแค่แถวเดียว

            if (error) {
                console.error('Error fetching event data:', error);
                return null;
            }

            return data;
        }
        async function checkout(method) {
            if (cart.length === 0) return;
            const btnCash = document.getElementById('btn-cash');
            const btnQr = document.getElementById('btn-qr');
            btnCash.disabled = true; btnQr.disabled = true;

            const total = cart.reduce((sum, item) => sum + (item.qty * item.price), 0);
            const qty = cart.reduce((sum, i) => sum + i.qty, 0);
            const summaryText = cart.map(i => `${i.name} x${i.qty}`).join(', ');

            const { error } = await _supabase.rpc('handle_sale_with_booth_stock', {
                p_booth_id: bId,
                p_event_id: evId,
                p_product_name: summaryText,
                p_amount: total,
                p_quantity: qty,
                p_payment_method: method,
                p_details: cart
            });

            if (!error) {
                alert('🎉 บันทึกการขายเรียบร้อย!');
                cart = [];
                updateUI();
                await loadProducts(); 
            } else {
                alert('❌ สต็อกอาจไม่พอหรือเกิดข้อผิดพลาด: ' + error.message);
            }
            
            btnCash.disabled = false; btnQr.disabled = false;
        }
        function openChangeModal() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            if (total <= 0) return alert('เลือกสินค้าก่อนครับ');

            document.getElementById('summary-total').innerText = total.toLocaleString() + '.-';
            const container = document.getElementById('quick-change-options');
            container.innerHTML = '';

            // รายการธนบัตรมาตรฐาน
            const bills = [20, 50, 100, 500, 1000];
            
            // หาแบงก์ที่มากกว่าหรือเท่ากับยอดซื้อ และแบงก์ถัดไปอีก 1-2 ระดับ
            const suggestedBills = bills.filter(bill => bill >= total).slice(0, 3);
            
            // ถ้าไม่มีแบงก์ในลิสต์ที่มากกว่า (เช่น ยอด 1,200) ให้เสนอแบงก์ 1000 สองใบ หรือปัดเศษ
            if (suggestedBills.length === 0) suggestedBills.push(Math.ceil(total/100)*100, Math.ceil(total/500)*500);

            // สร้างปุ่มทางลัด
            suggestedBills.forEach(amount => {
                const change = amount - total;
                const btn = document.createElement('button');
                btn.className = "flex justify-between items-center p-5 bg-indigo-50 border-2 border-indigo-100 rounded-2xl active:scale-95 transition-all group hover:bg-indigo-600 hover:border-indigo-600";
                btn.onclick = () => autoCheckout(amount);
                btn.innerHTML = `
                    <div class="text-left">
                        <span class="block text-[10px] font-bold text-indigo-400 group-hover:text-indigo-200 uppercase">รับแบงก์</span>
                        <span class="text-xl font-black text-indigo-700 group-hover:text-white">${amount.toLocaleString()}.-</span>
                    </div>
                    <div class="text-right">
                        <span class="block text-[10px] font-bold text-emerald-500 group-hover:text-emerald-200 uppercase">เงินทอน</span>
                        <span class="text-xl font-black text-emerald-600 group-hover:text-white">${change.toLocaleString()}.-</span>
                    </div>
                `;
                container.appendChild(btn);
            });

            // ปุ่มสำหรับ "จ่ายพอดี" (ถ้าแบงก์ไม่อยู่ในรายการที่แนะนำ)
            const exactBtn = document.createElement('button');
            exactBtn.className = "w-full p-4 bg-emerald-500 text-white rounded-2xl font-black shadow-lg shadow-emerald-100 active:scale-95 transition-all mb-2";
            exactBtn.innerText = `จ่ายพอดี (${total.toLocaleString()}.-)`;
            exactBtn.onclick = () => autoCheckout(total);
            container.prepend(exactBtn);

            openModal('change-modal');
        }

        async function autoCheckout(receivedAmount) {
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const change = receivedAmount - total;

            if (change > 0) {
                alert(`💵 ทอนเงิน: ${change.toLocaleString()} บาท`);
            }
            
            closeModal('change-modal');
            await checkout('cash');
        }

        async function confirmManualCash() {
            const received = parseFloat(document.getElementById('manual-cash').value);
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            if (!received || received < total) return alert('ยอดเงินไม่ถูกต้อง');
            await autoCheckout(received);
        }
        async function showHistory() {
        const modal = document.getElementById('history-modal');
        const list = document.getElementById('history-list');
        modal.classList.remove('hidden');
        list.innerHTML = '<p class="text-center py-4">กำลังโหลด...</p>';

        const { data } = await _supabase.from('sales_transactions')
            .select('sold_at, product_name, amount, payment_method')
            .eq('booth_id', bId)
            .order('sold_at', { ascending: false })
            .limit(10);

        if (!data || data.length === 0) {
            list.innerHTML = '<p class="text-center py-4 text-slate-400 text-sm">ยังไม่มีประวัติการขาย</p>';
            return;
        }

        list.innerHTML = data.map(item => {
            const time = new Date(item.sold_at).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
            return `
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex justify-between items-start gap-3">
                    <div class="flex-1 min-w-0">
                        <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">${time} น.</p>
                        <p class="text-xs font-bold text-slate-700 break-words leading-relaxed">${item.product_name}</p>
                    </div>
                    <div class="text-right shrink-0">
                        <p class="text-sm font-black text-slate-800">${item.amount.toLocaleString()}.-</p>
                        <span class="text-[8px] px-2 py-0.5 rounded-full font-bold ${item.payment_method === 'cash' ? 'bg-emerald-100 text-emerald-600' : 'bg-sky-100 text-sky-600'}">
                            ${item.payment_method === 'cash' ? 'เงินสด' : 'โอน/QR'}
                        </span>
                    </div>
                </div>
            `;
        }).join('');
}
        function closeHistory() { document.getElementById('history-modal').classList.add('hidden'); }
        function confirmClearCart() { if (cart.length > 0 && confirm("ล้างตะกร้า?")) { cart = []; updateUI(); } }
        init();
    </script>
</body>
</html>
